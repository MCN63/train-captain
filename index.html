  .btn-gold{

  }
  .btn-gold:disabled{
    background:#c9c2b0;
    color:#f2efe8;
    cursor:not-allowed;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--border);
    color:var(--ink);
  }
  section.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;

  h2{
    font-family:'Space Grotesk',sans-serif;

  .queue-list{
    display:flex;
    flex-direction:column;

  }
  .queue-row{
    display:flex;

  .queue-row:last-child{ border-bottom:none; }
  .queue-row.active-week{

  }
  .queue-num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px;
    height:20px;

  }
  .footnote{

  }
  .loading{

    align-items:flex-start;

    align-items:center;

  .sched-name{

  .sched-actions{

  .companion-mini{

  .sched-assign{

  .assign-select{
    flex:1;
    min-width:110px;

    padding:8px;

    font-size:13px;
    color:var(--ink);

  .empty-inline{

  .reset-violation-btn{

  .lotto-card{

    margin-bottom:16px;

    overflow:hidden;
  }
  .lotto-card h2{
    color:#fff;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .lotto-controls{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .lotto-controls input{
    width:70px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:10px;
    padding:10px 12px;
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    text-align:center;
  }
  .spin-display{
    text-align:center;
    padding:18px 0 22px;
  }
  .spin-name{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;
    font-weight:700;
    color:var(--gold);
    margin:0;
    animation:spin-pulse 0.35s ease-in-out infinite alternate;
  }
  @keyframes spin-pulse{
    from{ transform:scale(1); opacity:0.75; }
    to{ transform:scale(1.08); opacity:1; }
  }
  .winner-pills{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:6px 0 14px;
  }
  .winner-pill{
    background:var(--gold);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;

    font-size:15px;

  }
  .winner-pill.pop{
    animation:pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop-in{
    0%{ transform:scale(0.3); opacity:0; }
    70%{ transform:scale(1.15); opacity:1; }
    100%{ transform:scale(1); }
  }
  .confetti-layer{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:5;
  }
  .confetti-piece{
    position:absolute;
    top:-10%;
    font-size:18px;
    animation-name:confetti-fall;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
  }
  @keyframes confetti-fall{
    to{ transform:translateY(340px) rotate(360deg); opacity:0; }
  }
  .lotto-history-item{
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.12);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .lotto-history-item:last-child{border-bottom:none;}
  .lotto-history-item .l-date{
    font-family:'IBM Plex Mono',monospace;
    color:rgba(255,255,255,0.5);
    flex-shrink:0;
  }
  .lotto-history-item .l-winners{
    text-align:right;
  }
  .lotto-card .toggle-row .count-badge{
    color:rgba(255,255,255,0.55);
  }
</style>

<body>
<div class="wrap" id="app">
  <div class="loading">불러오는 중…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD5PMMVifLxteN4JGpwL_QvNZpMCpomuZU",
  authDomain: "train-captain.firebaseapp.com",
  databaseURL: "https://train-captain-default-rtdb.firebaseio.com",
  projectId: "train-captain",
  storageBucket: "train-captain.firebasestorage.app",
  messagingSenderId: "95047393942",
  appId: "1:95047393942:web:b3eaf3803a7fb4194ad8b7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DAY_DEFS = [
  { key:'mon', label:'월', pool:'waiting' },
  { key:'tue', label:'화', pool:'waiting' },
  { key:'wed', label:'수', pool:'waiting' },
  { key:'thu', label:'목', pool:'waiting' },
  { key:'fri', label:'금', pool:'waiting' },
  { key:'sat', label:'토', pool:'officer' },
  { key:'sun', label:'일', pool:'officer' }
];

let waitingList = [];   // 연맹원 명단
let officerList = [];   // 알포 명단
let weekSchedule = { weekKey: null, days: {} }; // 이번주 요일별 배정
let completedMembers = []; // 완료 기록 [{id,date,day,pool,companionId,noShow}]
let history = [];      // [{date, captainId, companionId, noShow}]
let lottoHistory = []; // [{date, winners:[...]}]
let violations = {};   // { memberId: count }
let lottoDrawState = null;
let isSpinning = false;
let spinInterval = null;
let spinDisplayName = '';
let lastSeenDrawKey = null;
let confettiBurstNonce = 0;
let lastError = null;
let historyExpanded = true;
let openMoveTarget = null; // 'waiting:아이디' 또는 'officer:아이디' - 이동 옵션이 펼쳐진 대상
let lottoExpanded = false;
let visitCount = 0;
const EDIT_PIN = 'mcnmcn77';
let isUnlocked = false;
let pinError = false;

function pad2(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){
  return d.getFullYear() + '.' + pad2(d.getMonth()+1) + '.' + pad2(d.getDate());
}
function getMondayOfWeek(d){
  const date = new Date(d);
  date.setHours(0,0,0,0);
  const day = date.getDay(); // 0=Sun..6=Sat
  const diff = (day === 0 ? -6 : 1) - day;
  date.setDate(date.getDate() + diff);
  return date;
}
function currentWeekKey(){
  return fmtDate(getMondayOfWeek(new Date()));
}
function dateForDayIndex(idx){ // 0=월 .. 6=일, 이번주 기준
  const monday = getMondayOfWeek(new Date());
  const d = new Date(monday);
  d.setDate(d.getDate() + idx);
  return d;
}
function todayDayIndex(){
  const jsDay = new Date().getDay(); // 0=Sun..6=Sat
  return jsDay === 0 ? 6 : jsDay - 1;
}
function monthStr(){
  const d = new Date();
  return d.getFullYear() + '.' + pad2(d.getMonth()+1);
}

function loadAll(){
  db.ref('rosterState').on('value', snap => {
    const v = snap.val() || {};
    waitingList = v.waitingList || [];
    officerList = v.officerList || [];
    render();
  }, err => {
    lastError = '불러오기 실패(명단): ' + err.message;
    render();
  });
  db.ref('weekSchedule').on('value', snap => {
    weekSchedule = snap.val() || { weekKey: null, days: {} };
    render();
  }, err => {
    lastError = '불러오기 실패(스케줄): ' + err.message;
    render();
  });
  db.ref('completedLog').on('value', snap => {
    completedMembers = snap.val() || [];
    render();
  }, err => {
    lastError = '불러오기 실패(완료기록): ' + err.message;
    render();
  });
  db.ref('historyLog').on('value', snap => {
    history = snap.val() || [];
    render();
  }, err => {
    lastError = '불러오기 실패(기록): ' + err.message;
    render();
  });
  db.ref('lottoHistory').on('value', snap => {
    lottoHistory = snap.val() || [];
    render();
  }, err => {
    lastError = '불러오기 실패(로또): ' + err.message;
    render();
  });
  db.ref('violations').on('value', snap => {
    violations = snap.val() || {};
    render();
  }, err => {
    lastError = '불러오기 실패(경고): ' + err.message;
    render();
  });
  db.ref('lottoDraw').on('value', snap => {
    lottoDrawState = snap.val() || null;
    if(lottoDrawState && lottoDrawState.drawing){
      startSpinAnimation();
    } else {
      stopSpinAnimation();
    }
    render();
  });
  db.ref('visitCount').on('value', snap => {
    visitCount = snap.val() || 0;
    render();
  });
}

function recordVisit(){
  db.ref('visitCount').transaction(current => (current || 0) + 1);
}

function startSpinAnimation(){
  if(isSpinning) return;
  isSpinning = true;
  const pool = waitingList.concat(officerList);
  spinInterval = setInterval(() => {
    if(pool.length > 0){
      spinDisplayName = pool[Math.floor(Math.random() * pool.length)];
    }
    render();
  }, 90);
}

function stopSpinAnimation(){
  if(!isSpinning) return;
  isSpinning = false;
  if(spinInterval){ clearInterval(spinInterval); spinInterval = null; }
}

async function saveRoster(){
  try{
    await db.ref('rosterState').set({ waitingList, officerList });
    if(lastError && lastError.startsWith('저장 실패')){ lastError = null; render(); }
  }catch(e){
    lastError = '저장 실패(명단): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveWeekSchedule(){
  try{
    await db.ref('weekSchedule').set(weekSchedule);
  }catch(e){
    lastError = '저장 실패(스케줄): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveCompleted(){
  try{
    await db.ref('completedLog').set(completedMembers.slice(0,300));
  }catch(e){
    lastError = '저장 실패(완료기록): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveHistory(){
  try{
    await db.ref('historyLog').set(history.slice(0,50));
  }catch(e){
    lastError = '저장 실패(기록): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveLotto(){
  try{
    await db.ref('lottoHistory').set(lottoHistory.slice(0,24));
  }catch(e){
    lastError = '저장 실패(로또): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveViolations(){
  try{
    await db.ref('violations').set(violations);
  }catch(e){
    lastError = '저장 실패(경고): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

function addPerson(listName, id){
  id = id.trim();
  if(!id) return;
  if(waitingList.includes(id) || officerList.includes(id)){
    alert('이미 등록된 아이디예요.');
    return;
  }
  if(listName === 'officer'){ officerList.push(id); } else { waitingList.push(id); }
  saveRoster();
  render();
}

function movePersonTo(listName, personId, afterId){
  const arr = listName === 'officer' ? officerList : waitingList;
  const idx = arr.indexOf(personId);
  if(idx === -1) return;
  arr.splice(idx, 1);
  if(afterId === '__front__' || !afterId){
    arr.unshift(personId);
  } else {
    const afterIdx = arr.indexOf(afterId);
    if(afterIdx === -1){
      arr.push(personId);
    } else {
      arr.splice(afterIdx + 1, 0, personId);
    }
  }
  openMoveTarget = null;
  saveRoster();
  render();
}

function removePerson(listName, idx){
  const arr = listName === 'officer' ? officerList : waitingList;
  const removedId = arr[idx];
  arr.splice(idx, 1);
  // 이번주에 배정만 되고 아직 완료 전이었다면 배정도 같이 취소
  const { wKey, days } = getEffectiveDays();
  const newDays = { ...days };
  let daysChanged = false;
  Object.keys(newDays).forEach(k => {
    if(newDays[k] && newDays[k].id === removedId && newDays[k].status === 'pending'){
      delete newDays[k];
      daysChanged = true;
    }
  });
  if(daysChanged){
    weekSchedule = { weekKey: wKey, days: newDays };
    saveWeekSchedule();
  }
  saveRoster();
  render();
}

function resetViolation(id){
  if(!confirm(`${id}님의 경고 기록을 초기화할까요?`)) return;
  delete violations[id];
  saveViolations();
  render();
}

function deleteHistoryEntry(idx){
  if(idx < 0 || idx >= history.length) return;
  history.splice(idx, 1);
  saveHistory();
  render();
}

function clearAllHistory(){
  if(!confirm('최근 기차장 기록을 전부 삭제할까요?')) return;
  history = [];
  saveHistory();
  render();
}

function deleteCompletedEntry(idx){
  if(idx < 0 || idx >= completedMembers.length) return;
  completedMembers.splice(idx, 1);
  saveCompleted();
  render();
}

function getEffectiveDays(){
  const wKey = currentWeekKey();
  if(weekSchedule.weekKey === wKey && weekSchedule.days){
    return { wKey, days: weekSchedule.days };
  }
  return { wKey, days: {} };
}

// 명단 순서대로 비어있는 요일을 자동으로 채움 (추가 버튼 누르면 바로 반영되도록)
function autoFillWeek(){
  const { wKey, days } = getEffectiveDays();
  const newDays = { ...days };
  const usedIds = new Set(Object.values(newDays).filter(Boolean).map(d => d.id));
  let anyChange = false;
  DAY_DEFS.forEach(def => {
    if(newDays[def.key]) return; // 이미 배정(대기중이든 완료든) 되어있으면 건드리지 않음
    const pool = def.pool === 'officer' ? officerList : waitingList;
    const candidate = pool.find(id => !usedIds.has(id));
    if(candidate){
      newDays[def.key] = { id: candidate, status: 'pending', companionId: '' };
      usedIds.add(candidate);
      anyChange = true;
    }
  });
  if(anyChange){
    weekSchedule = { weekKey: wKey, days: newDays };
    saveWeekSchedule();
  }
}

function completeDay(dayKey, companionId, noShow){
  const { wKey, days } = getEffectiveDays();
  const info = days[dayKey];
  if(!info || !info.id) return;
  const personId = info.id;
  const dayIdx = DAY_DEFS.findIndex(d => d.key === dayKey);
  const def = DAY_DEFS[dayIdx];
  const dateStr = fmtDate(dateForDayIndex(dayIdx));

  // 큐에서 빼서 맨 뒤에 다시 넣음 -> 순서가 다시 돌아옴
  if(def.pool === 'officer'){
    officerList = officerList.filter(id => id !== personId);
    officerList.push(personId);
  } else {
    waitingList = waitingList.filter(id => id !== personId);
    waitingList.push(personId);
  }

  completedMembers.unshift({
    id: personId,
    date: dateStr,
    day: def.label,
    pool: def.pool === 'officer' ? '알포' : '연맹원',
    companionId: (companionId || '').trim(),
    noShow: !!noShow
  });

  history.unshift({
    date: dateStr,
    captainId: personId,
    companionId: (companionId || '').trim(),
    noShow: !!noShow
  });

  if(noShow){
    violations[personId] = (violations[personId] || 0) + 1;
    saveViolations();
  }

  const newDays = { ...days, [dayKey]: { id: personId, status: noShow ? 'noshow' : 'done', companionId: (companionId || '').trim() } };
  weekSchedule = { weekKey: wKey, days: newDays };

  saveRoster();
  saveWeekSchedule();
  saveCompleted();
  saveHistory();
  render();
}

function shuffledCopy(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startDraw(count){
  if(isSpinning || (lottoDrawState && lottoDrawState.drawing)){
    return;
  }
  const totalPool = waitingList.concat(officerList);
  if(totalPool.length === 0){
    alert('참가자가 없어요. 먼저 명단에 아이디를 추가해주세요.');
    return;
  }
  const wonSet = new Set(lottoHistory.flatMap(l => l.winners));
  const pool = totalPool.filter(id => !wonSet.has(id));
  if(pool.length === 0){
    alert('이미 모든 인원이 당첨됐어요. "당첨 기록 초기화"를 누르면 처음부터 다시 뽑을 수 있어요.');
    return;
  }
  db.ref('lottoDraw').set({ drawing: true, count, startedAt: Date.now() });
  setTimeout(() => finalizeDraw(count), 2600);
}

function finalizeDraw(count){
  const totalPool = waitingList.concat(officerList);
  const wonSet = new Set(lottoHistory.flatMap(l => l.winners));
  const pool = totalPool.filter(id => !wonSet.has(id));
  if(pool.length === 0){
    db.ref('lottoDraw').set({ drawing: false });
    return;
  }
  const n = Math.max(1, Math.min(count, pool.length));
  const winners = shuffledCopy(pool).slice(0, n);
  lottoHistory.unshift({ date: monthStr(), winners });
  saveLotto();
  db.ref('lottoDraw').set({ drawing: false });
}

function resetLottoHistory(){
  if(!confirm('당첨 기록을 전부 초기화할까요? 이전에 당첨된 사람도 다시 대상에 포함돼요.')) return;
  lottoHistory = [];
  saveLotto();
  render();
}

function groupByMonth(items, dateStr){
  const map = new Map();
  items.forEach(item => {
    const key = dateStr(item).slice(0,7); // 'YYYY.MM'
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  });
  return map;
}

function monthLabel(key){
  const [y, m] = key.split('.');
  return y + '년 ' + parseInt(m,10) + '월';
}

  document.getElementById('clearHistoryBtn')?.addEventListener('click', clearAllHistory);
  document.getElementById('historyToggle')?.addEventListener('click', () => {
    historyExpanded = !historyExpanded;
    render();
  });
  document.getElementById('lottoToggle')?.addEventListener('click', () => {
    lottoExpanded = !lottoExpanded;
    render();
  });
  document.getElementById('addWaitingBtn')?.addEventListener('click', () => {
    const input = document.getElementById('newWaitingInput');
    addPerson('waiting', input.value);
    input.value = '';
  });
  document.getElementById('newWaitingInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      addPerson('waiting', e.target.value);
      e.target.value = '';
    }
  });
  document.getElementById('addOfficerBtn')?.addEventListener('click', () => {
    const input = document.getElementById('newOfficerInput');
    addPerson('officer', input.value);
    input.value = '';
  });
  document.getElementById('newOfficerInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      addPerson('officer', e.target.value);
      e.target.value = '';
    }
  });
  document.getElementById('drawBtn')?.addEventListener('click', () => {
    const countInput = document.getElementById('lottoCount');
    const count = parseInt(countInput.value, 10) || 1;
    startDraw(count);
  });
  app.querySelectorAll('.pill-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
      const listName = e.currentTarget.getAttribute('data-list');
      removePerson(listName, idx);
    });
  });
  app.querySelectorAll('.queue-name').forEach(el => {
    el.addEventListener('click', (e) => {
      const listName = e.currentTarget.getAttribute('data-list');
      const id = e.currentTarget.getAttribute('data-id');
      const key = `${listName}:${id}`;
      openMoveTarget = (openMoveTarget === key) ? null : key;
      render();
    });
  });
  app.querySelectorAll('.move-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const listName = e.currentTarget.getAttribute('data-list');
      const id = e.currentTarget.getAttribute('data-id');
      const target = e.currentTarget.value;
      if(!target) return;
      movePersonTo(listName, id, target);
    });
  });
  app.querySelectorAll('.sched-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const dayKey = e.currentTarget.getAttribute('data-day');
      const action = e.currentTarget.getAttribute('data-action');
      if(action === 'done' || action === 'noshow'){
        const companionInput = document.getElementById(`companion-${dayKey}`);
        const companionVal = companionInput ? companionInput.value : '';
        completeDay(dayKey, companionVal, action === 'noshow');
      }
    });
  });
  app.querySelectorAll('.reset-violation-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const vid = e.currentTarget.getAttribute('data-vid');
      const hidx = e.currentTarget.getAttribute('data-hidx');
      const cidx = e.currentTarget.getAttribute('data-cidx');
      if(vid !== null){
        resetViolation(vid);
      } else if(hidx !== null){
        deleteHistoryEntry(parseInt(hidx, 10));
      } else if(cidx !== null){
        deleteCompletedEntry(parseInt(cidx, 10));
      }
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadAll();
recordVisit();
</script>
</body>
</html>
