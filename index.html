<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기차장 순번표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF7;
    --ink:#1B1B1F;
    --rail:#34495E;
    --signal:#E4572E;
    --gold:#B8860B;
    --track-done:#C9CDD3;
    --muted:#6B7280;
    --card:#FFFFFF;
    --border:#E7E5DE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header{
    margin-bottom:20px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--muted);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .today-card{
    background:var(--ink);
    color:#fff;
    border-radius:16px;
    padding:22px 20px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .today-card .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.55);
    margin:0 0 10px;
  }
  .today-card .captain-id{
    font-family:'Space Grotesk',sans-serif;
    font-size:34px;
    font-weight:700;
    margin:0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .today-card .train-glyph{
    font-size:22px;
  }
  .today-card .date{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:rgba(255,255,255,0.5);
    margin-top:6px;
  }
  .companion-row{
    margin-top:16px;
    display:flex;
    gap:8px;
  }
  .companion-row input{
    flex:1;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:10px;
    padding:10px 12px;
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
  }
  .companion-row input::placeholder{
    color:rgba(255,255,255,0.4);
  }
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;
    transition:opacity 0.15s ease, transform 0.1s ease;
  }
  button:active{transform:scale(0.97);}
  button:focus-visible{outline:2px solid var(--signal); outline-offset:2px;}
  .btn-signal{
    background:var(--signal);
    color:#fff;
  }
  .btn-signal:disabled{
    background:#555;
    color:#aaa;
    cursor:not-allowed;
  }
  .btn-gold{
    background:var(--gold);
    color:#fff;
  }
  .btn-gold:disabled{
    background:#c9c2b0;
    color:#f2efe8;
    cursor:not-allowed;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--border);
    color:var(--ink);
  }
  section.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
  }
  h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    font-weight:700;
    margin:0 0 14px;
  }
  .pill-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:999px;
    padding:6px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink);
  }
  .pill.current{
    background:var(--signal);
    border-color:var(--signal);
    color:#fff;
    font-weight:600;
  }
  .pill.done{
    color:var(--muted);
    border-color:var(--track-done);
    background:transparent;
  }
  .warn-badge{
    display:inline-block;
    margin-left:6px;
    font-size:11px;
    font-weight:700;
    color:#A02C1F;
  }
  .pill.current .warn-badge{
    color:#FFE3DA;
  }
  .rail-list{
    list-style:none;
    margin:0;
    padding:0;
    position:relative;
  }
  .rail-list::before{
    content:"";
    position:absolute;
    left:11px;
    top:10px;
    bottom:10px;
    width:2px;
    background:var(--track-done);
  }
  .rail-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding:9px 0;
  }
  .station-dot{
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--card);
    border:2px solid var(--track-done);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--muted);
    z-index:1;
    position:relative;
  }
  .rail-item.current .station-dot{
    width:28px;
    height:28px;
    border-color:var(--signal);
    background:var(--signal);
    color:#fff;
    box-shadow:0 0 0 4px rgba(228,87,46,0.15);
  }
  .rail-item.done .station-dot{
    border-color:var(--rail);
    background:var(--rail);
    color:#fff;
  }
  .rail-item.done .member-id{
    color:var(--muted);
  }
  .rail-item .member-id{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:500;
  }
  .rail-item.current .member-id{
    font-weight:600;
    color:var(--signal);
  }
  .rail-item .remove-btn{
    margin-left:auto;
    background:none;
    border:none;
    color:var(--muted);
    font-size:16px;
    padding:2px 8px;
    cursor:pointer;
  }
  .pill-remove{
    background:none;
    border:none;
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
    padding:0 4px;
    line-height:1;
  }
  .pill.current .pill-remove{
    color:rgba(255,255,255,0.7);
  }
  .edit-btn{
    background:none;
    border:none;
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
    padding:0 4px;
    line-height:1;
  }
  .empty-inline{
    color:var(--muted);
    font-size:13px;
  }
  .today-tag{
    display:inline-block;
    background:var(--signal);
    color:#fff;
    font-size:9px;
    font-weight:700;
    padding:1px 6px;
    border-radius:999px;
    vertical-align:middle;
    margin-left:2px;
  }
  .sched-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 10px;
    border-bottom:1px solid var(--border);
    flex-wrap:wrap;
    border-radius:8px;
  }
  .sched-row:last-child{ border-bottom:none; }
  .sched-row.today{
    background:rgba(228,87,46,0.07);
  }
  .sched-day{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
    width:58px;
    flex-shrink:0;

  .sched-day-label{
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;
    font-weight:700;
  }
  .sched-day-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--muted);
  }
  .sched-pool-tag{
    font-size:9px;
    font-family:'IBM Plex Mono',monospace;
    padding:1px 6px;
    border-radius:999px;
    margin-top:2px;
    display:inline-block;
  }
  .sched-pool-tag.waiting{
    background:rgba(52,73,94,0.1);
    color:var(--rail);
  }
  .sched-pool-tag.officer{
    background:rgba(107,79,160,0.12);
    color:#6B4FA0;
  }
  .sched-right{
    flex:1;
    min-width:180px;
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:6px;
  }
  .sched-name{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:600;
  }
  .sched-done-badge{
    font-size:11px;
    font-weight:700;
    color:var(--rail);
  }
  .sched-actions{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    margin-top:6px;
    width:100%;
  }
  .companion-mini{
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    flex:1;
    min-width:100px;
  }
  .sched-btn{
    padding:6px 10px;
    font-size:12px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
  }
  .move-panel{
    padding:8px 10px 12px 38px;
    background:var(--bg);
    border-bottom:1px solid var(--border);
  }
  .assign-select{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    color:var(--ink);
    background:var(--card);
  }
  .move-select{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    color:var(--ink);
    background:var(--card);
  }
  .queue-list{
    display:flex;
    flex-direction:column;
    margin-bottom:12px;
  }
  .queue-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border-bottom:1px solid var(--border);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--ink);
  }
  .queue-row:last-child{ border-bottom:none; }
  .queue-row.active-week{
    background:rgba(228,87,46,0.08);
    border-radius:8px;
  }
  .queue-num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px;
    height:20px;
    border-radius:50%;
    background:var(--track-done);
    color:#fff;
    font-size:10px;
    font-weight:700;
    flex-shrink:0;
  }
  .queue-row.active-week .queue-num{
    background:var(--signal);
  }
  .queue-name{
    font-weight:500;
  }
  .queue-row.active-week .queue-name{
    color:var(--signal);
    font-weight:700;
  }
  .caret{
    color:var(--muted);
    font-size:10px;
  }
  .reset-violation-btn{
    background:none;
    border:none;
    color:var(--muted);
    font-size:15px;
    padding:2px 6px;
    cursor:pointer;
    flex-shrink:0;
  }
  .add-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }
  .add-row input{
    flex:1;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
  }
  .add-row select{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 8px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    color:var(--ink);
    background:var(--card);
    max-width:130px;
  }
  .history-item{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:8px 0;
    border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .history-item:last-child{border-bottom:none;}
  .history-item .h-date{
    font-family:'IBM Plex Mono',monospace;
    color:var(--muted);
    font-size:11px;
    flex-shrink:0;
    width:68px;
  }
  .history-item .h-main{
    font-weight:500;
  }
  .toggle-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    margin:0;
  }
  .toggle-row h2{margin:0;}
  .toggle-row .count-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:4px;
  }
  .month-group{
    margin-top:14px;
  }
  .month-group:first-child{margin-top:12px;}
  .month-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--muted);
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .empty{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    padding:16px 0;
  }
  .footnote{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    margin-top:8px;
  }
  .loading{
    text-align:center;
    padding:60px 0;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
  }
  .error-banner{
    background:#FDECEA;
    border:1px solid #F5B5AC;
    color:#A02C1F;
    border-radius:10px;
    padding:12px 14px;
    font-size:12px;
    font-family:'IBM Plex Mono',monospace;
    margin-bottom:16px;
    word-break:break-all;
    line-height:1.5;
  }
  .lock-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:16px;
  }
  .lock-bar .lock-icon{
    font-size:16px;
    flex-shrink:0;
  }
  .lock-bar input{
    flex:1;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    min-width:0;
  }
  .lock-bar .status-label{
    font-size:12px;
    color:var(--muted);
    flex-shrink:0;
  }
  .visit-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    flex-shrink:0;
    margin-left:auto;
  }
  .lock-bar.unlocked{
    border-color:var(--rail);
    background:#F0F4F7;
  }
  .lock-bar.unlocked .status-label{
    color:var(--rail);
    font-weight:600;
  }
  .pin-error{
    font-size:11px;
    color:#A02C1F;
    margin:-10px 0 14px;
  }
  .locked-note{
    color:var(--muted);
    font-size:12px;
    text-align:center;
    padding:10px 0;
  }
  .lotto-card{
    background:linear-gradient(135deg, #1B1B1F 0%, #34292B 100%);
    color:#fff;
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
  }
  .lotto-card h2{
    color:#fff;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .lotto-controls{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .lotto-controls input{
    width:70px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:10px;
    padding:10px 12px;
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    text-align:center;
  }
  .spin-display{
    text-align:center;
    padding:18px 0 22px;
  }
  .spin-name{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;
    font-weight:700;
    color:var(--gold);
    margin:0;
    animation:spin-pulse 0.35s ease-in-out infinite alternate;
  }
  @keyframes spin-pulse{
    from{ transform:scale(1); opacity:0.75; }
    to{ transform:scale(1.08); opacity:1; }
  }
  .winner-pills{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:6px 0 14px;
  }
  .winner-pill{
    background:var(--gold);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:8px 14px;
    border-radius:10px;
  }
  .winner-pill.pop{
    animation:pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop-in{
    0%{ transform:scale(0.3); opacity:0; }
    70%{ transform:scale(1.15); opacity:1; }
    100%{ transform:scale(1); }
  }
  .confetti-layer{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:5;
  }
  .confetti-piece{
    position:absolute;
    top:-10%;
    font-size:18px;
    animation-name:confetti-fall;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
  }
  @keyframes confetti-fall{
    to{ transform:translateY(340px) rotate(360deg); opacity:0; }
  }
  .lotto-history-item{
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.12);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .lotto-history-item:last-child{border-bottom:none;}
  .lotto-history-item .l-date{
    font-family:'IBM Plex Mono',monospace;
    color:rgba(255,255,255,0.5);
    flex-shrink:0;
  }
  .lotto-history-item .l-winners{
    text-align:right;
  }
  .lotto-card .toggle-row .count-badge{
    color:rgba(255,255,255,0.55);
  }
</style>
</head>

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){
  return d.getFullYear() + '.' + pad2(d.getMonth()+1) + '.' + pad2(d.getDate());
}
function getMondayOfWeek(d){
  const date = new Date(d);
  date.setHours(0,0,0,0);
  const day = date.getDay(); // 0=Sun..6=Sat
  const diff = (day === 0 ? -6 : 1) - day;
  date.setDate(date.getDate() + diff);
  return date;
}
function weekKeyForOffset(offsetWeeks){ // 0=이번주, 1=다음주 (Firebase 키라서 '.' 대신 '-' 사용)
  const monday = getMondayOfWeek(new Date());
  monday.setDate(monday.getDate() + offsetWeeks * 7);
  return monday.getFullYear() + '-' + pad2(monday.getMonth()+1) + '-' + pad2(monday.getDate());
}
function dateForOffsetDayIndex(offsetWeeks, idx){ // 0=월 .. 6=일
  const monday = getMondayOfWeek(new Date());
  monday.setDate(monday.getDate() + offsetWeeks * 7 + idx);
  return monday;
}
function todayDayIndex(){
  const jsDay = new Date().getDay(); // 0=Sun..6=Sat
  return jsDay === 0 ? 6 : jsDay - 1;
}
function monthStr(){
  const d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0');
}

function addMember(listName, id){
  id = id.trim();
  if(!id) return;
  if(waitingList.includes(id) || officerList.includes(id)){
    alert('이미 등록된 아이디예요.');
    return;
  }
  if(listName === 'officer'){ officerList.push(id); } else { waitingList.push(id); }
  saveRoster();
  render();
}

function removeMember(listName, idx){
  const arr = listName === 'officer' ? officerList : waitingList;
  const removedId = arr[idx];
  arr.splice(idx, 1);
  // 대기중(pending)인 배정에 이 사람이 있었다면 (이번주/다음주 포함) 그 배정도 같이 취소
  const newSchedules = { ...weekSchedules };
  let changed = false;
  Object.keys(newSchedules).forEach(wk => {
    const days = (newSchedules[wk] && newSchedules[wk].days) || {};
    const newDays = { ...days };
    let dayChanged = false;
    Object.keys(newDays).forEach(k => {
      if(newDays[k] && newDays[k].id === removedId && newDays[k].status === 'pending'){
        delete newDays[k];
        dayChanged = true;
      }
    });
    if(dayChanged){
      newSchedules[wk] = { ...newSchedules[wk], days: newDays };
      changed = true;
    }
  });
  if(changed){
    weekSchedules = newSchedules;
    saveWeekSchedules();
  }
  saveRoster();
  render();
}

function movePersonTo(listName, personId, afterId){
  const arr = listName === 'officer' ? officerList : waitingList;
  const idx = arr.indexOf(personId);
  if(idx === -1) return;
  arr.splice(idx, 1);
  if(afterId === '__front__' || !afterId){
    arr.unshift(personId);
  } else {
    const afterIdx = arr.indexOf(afterId);
    if(afterIdx === -1){
      arr.push(personId);
    } else {
      arr.splice(afterIdx + 1, 0, personId);
    }
  }
  openMoveTarget = null;
  saveRoster();
  render();
}

// 이미 등록된 아이디의 이름을 고침 (오타 수정 등). 스케줄/완료기록/경고/기록까지 다 같이 바뀜
function renamePerson(listName, oldId, newIdRaw){
  const newId = (newIdRaw || '').trim();
  if(!newId || newId === oldId){ openEditTarget = null; render(); return; }
  if(waitingList.includes(newId) || officerList.includes(newId)){
    alert('이미 있는 아이디예요.');
    return;
  }
  const arr = listName === 'officer' ? officerList : waitingList;
  const idx = arr.indexOf(oldId);
  if(idx === -1) return;
  arr[idx] = newId;

  // 이번주/다음주 스케줄에 있던 배정도 이름 갱신
  const newSchedules = { ...weekSchedules };
  let schedChanged = false;
  Object.keys(newSchedules).forEach(wk => {
    const days = (newSchedules[wk] && newSchedules[wk].days) || {};
    const newDays = { ...days };
    let dayChanged = false;
    Object.keys(newDays).forEach(k => {
      if(newDays[k] && newDays[k].id === oldId){
        newDays[k] = { ...newDays[k], id: newId };
        dayChanged = true;
      }
    });
    if(dayChanged){
      newSchedules[wk] = { ...newSchedules[wk], days: newDays };
      schedChanged = true;
    }
  });
  if(schedChanged){
    weekSchedules = newSchedules;
    saveWeekSchedules();
  }

  // 완료 기록 이름도 갱신
  let completedChanged = false;
  completedMembers = completedMembers.map(c => {
    if(c.id === oldId){ completedChanged = true; return { ...c, id: newId }; }
    return c;
  });
  if(completedChanged) saveCompleted();

  // 최근 기록 이름도 갱신
  let historyChanged = false;
  history = history.map(h => {
    if(h.captainId === oldId){ historyChanged = true; return { ...h, captainId: newId }; }
    return h;
  });
  if(historyChanged) saveHistory();

  // 경고 카운트도 이름 옮기기
  if(violations[oldId]){
    violations[newId] = (violations[newId] || 0) + violations[oldId];
    delete violations[oldId];
    saveViolations();
  }

  openEditTarget = null;
  saveRoster();
  render();
}

function getWeekEntry(weekKey){
  return weekSchedules[weekKey] || { days: {}, manualCleared: [] };
}
function getDaysForWeek(weekKey){
  return getWeekEntry(weekKey).days || {};
}

// 관리자가 직접 요일에 사람을 배정/변경
function assignDay(weekKey, dayKey, personId){
  if(!personId) return;
  const entry = getWeekEntry(weekKey);
  const existing = entry.days[dayKey];
  if(existing && existing.status !== 'pending') return; // 완료된 요일은 변경 불가
  const newDays = { ...entry.days, [dayKey]: { id: personId, status: 'pending', companionId: '' } };
  weekSchedules = { ...weekSchedules, [weekKey]: { ...entry, days: newDays } };
  openAssignDay = null;
  saveWeekSchedules();
  render();
}

// 배정 취소: 이 자리는 자동배정이 다시 채우지 않도록 표시해둠 (진짜로 비워두고 싶을 때)
function unassignDay(weekKey, dayKey){
  const entry = getWeekEntry(weekKey);
  const existing = entry.days[dayKey];
  if(!existing || existing.status !== 'pending') return;
  const newDays = { ...entry.days };
  delete newDays[dayKey];
  const newManualCleared = Array.from(new Set([...(entry.manualCleared || []), dayKey]));
  weekSchedules = { ...weekSchedules, [weekKey]: { days: newDays, manualCleared: newManualCleared } };
  openAssignDay = null;
  saveWeekSchedules();
  render();
}

// 명단 순서대로 빈 요일을 자동으로 채움 (수동으로 비워둔 자리는 건드리지 않음)
function autoFillWeek(weekKey, alreadyUsedIds){
  const entry = getWeekEntry(weekKey);
  const days = entry.days || {};
  const manualCleared = entry.manualCleared || [];
  const usedIds = new Set(alreadyUsedIds);
  Object.values(days).forEach(d => { if(d) usedIds.add(d.id); });
  const newDays = { ...days };
  let changed = false;
  DAY_DEFS.forEach(def => {
    if(newDays[def.key]) return; // 이미 배정됨
    if(manualCleared.includes(def.key)) return; // 관리자가 일부러 비워둔 자리는 자동으로 안 채움
    const pool = def.pool === 'officer' ? officerList : waitingList;
    const candidate = pool.find(id => !usedIds.has(id));
    if(candidate){
      newDays[def.key] = { id: candidate, status: 'pending', companionId: '' };
      usedIds.add(candidate);
      changed = true;
    }
  });
  if(changed){
    weekSchedules = { ...weekSchedules, [weekKey]: { ...entry, days: newDays } };
  }
  return usedIds; // 다음 주 자동배정에서 중복 방지용으로 재사용 가능
}

function advance(weekKey, dayKey, companionId, noShow){
  const entry = getWeekEntry(weekKey);
  const days = entry.days;
  const info = days[dayKey];
  if(!info || !info.id) return;
  const personId = info.id;
  const dayIdx = DAY_DEFS.findIndex(d => d.key === dayKey);
  const def = DAY_DEFS[dayIdx];
  const offsetWeeks = weekKey === weekKeyForOffset(1) ? 1 : 0;
  const dateStr = fmtDate(dateForOffsetDayIndex(offsetWeeks, dayIdx));

  // 큐에서 빼서 맨 뒤에 다시 넣음 -> 순서가 다시 돌아옴
  if(def.pool === 'officer'){
    officerList = officerList.filter(id => id !== personId);
    officerList.push(personId);
  } else {
    waitingList = waitingList.filter(id => id !== personId);
    waitingList.push(personId);
  }

  completedMembers.unshift({
    id: personId,
    date: dateStr,
    day: def.label,
    pool: def.pool === 'officer' ? '알포' : '연맹원',
    companionId: (companionId || '').trim(),
    noShow: !!noShow
  });

  history.unshift({
    date: dateStr,
    captainId: personId,
    companionId: (companionId || '').trim(),
    noShow: !!noShow
  });

  if(noShow){
    violations[personId] = (violations[personId] || 0) + 1;
    saveViolations();
  }

  const newDays = { ...days, [dayKey]: { id: personId, status: noShow ? 'noshow' : 'done', companionId: (companionId || '').trim() } };
  weekSchedules = { ...weekSchedules, [weekKey]: { ...entry, days: newDays } };

  saveRoster();
  saveWeekSchedules();
  saveCompleted();
  saveHistory();
  render();
}

function shuffledCopy(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startDraw(count){
  if(isSpinning || (lottoDrawState && lottoDrawState.drawing)){
    return; // 이미 다른 사람이 추첨 중
  }
  const totalPool = waitingList.concat(officerList);
  if(totalPool.length === 0){
    alert('참가자가 없어요. 먼저 명단에 아이디를 추가해주세요.');
    return;
  }
  const wonSet = new Set(lottoHistory.flatMap(l => l.winners));
  const pool = totalPool.filter(id => !wonSet.has(id));
  if(pool.length === 0){
    alert('이미 모든 인원이 당첨됐어요. "당첨 기록 초기화"를 누르면 처음부터 다시 뽑을 수 있어요.');
    return;
  }
  db.ref('lottoDraw').set({ drawing: true, count, startedAt: Date.now() });
  setTimeout(() => finalizeDraw(count), 2600);
}

function finalizeDraw(count){
  const totalPool = waitingList.concat(officerList);
  const wonSet = new Set(lottoHistory.flatMap(l => l.winners));
  const pool = totalPool.filter(id => !wonSet.has(id));
  if(pool.length === 0){
    db.ref('lottoDraw').set({ drawing: false });
    return;
  }
  const n = Math.max(1, Math.min(count, pool.length));
  const winners = shuffledCopy(pool).slice(0, n);
  lottoHistory.unshift({ date: monthStr(), winners });
  saveLotto();
  db.ref('lottoDraw').set({ drawing: false });
}

  if(!confirm('당첨 기록을 전부 초기화할까요? 이전에 당첨된 사람도 다시 대상에 포함돼요.')) return;
  lottoHistory = [];
  saveLotto();
  render();
}

function groupByMonth(items, dateStr){
  const map = new Map();
  items.forEach(item => {
    const key = dateStr(item).slice(0,7); // 'YYYY.MM'
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  });
  return map;
}

function monthLabel(key){
  const [y, m] = key.split('.');
  return y + '년 ' + parseInt(m,10) + '월';
}

function render(){
  const app = document.getElementById('app');

  // 당첨자가 새로 갱신됐는지 감지해서 컨페티 연출 트리거
  const currentDrawKey = lottoHistory.length ? JSON.stringify(lottoHistory[0]) : null;
  if(lastSeenDrawKey === null){
    lastSeenDrawKey = currentDrawKey; // 최초 로드시엔 조용히 기준만 잡음
  } else if(currentDrawKey !== lastSeenDrawKey){
    lastSeenDrawKey = currentDrawKey;

    setTimeout(render, 1550); // 연출 종료 후 자동으로 지워지도록

  const confettiEmojis = ['🎉','🎊','✨','⭐','🚂'];

    const emoji = confettiEmojis[Math.floor(Math.random()*confettiEmojis.length)];

    const delay = (Math.random()*0.3).toFixed(2);

  }).join('') : '';

  const thisWeekKey = weekKeyForOffset(0);
  const nextWeekKey = weekKeyForOffset(1);
  const scheduleBefore = weekSchedules;
  let usedIdsAcc = new Set();
  usedIdsAcc = autoFillWeek(thisWeekKey, usedIdsAcc); // 이번주 먼저 채우고
  usedIdsAcc = autoFillWeek(nextWeekKey, usedIdsAcc);  // 다음주는 이번주 배정자를 제외한 다음 순번부터 이어서 채움
  if(weekSchedules !== scheduleBefore){
    saveWeekSchedules();
  }
  const thisWeekDays = getDaysForWeek(thisWeekKey);
  const todayIdx = todayDayIndex();
  const todayDef = DAY_DEFS[todayIdx];
  const todayInfo = thisWeekDays[todayDef.key];

  function buildScheduleRowsHtml(weekKey, offsetWeeks){
    const days = getDaysForWeek(weekKey);
    const usedIdsThisWeek = new Set(Object.values(days).filter(Boolean).map(d => d.id));
    return DAY_DEFS.map((def, idx) => {
      const info = days[def.key];
      const dateLabel = fmtDate(dateForOffsetDayIndex(offsetWeeks, idx)).slice(5);

          ${info.companionId ? `<span style="color:var(--muted); font-size:12px;"> → ${escapeHtml(info.companionId)}</span>` : ''}
          ${violations[info.id] ? `<span class="warn-badge">⚠️${violations[info.id]}</span>` : ''}

      return `
        <div class="sched-row ${isToday ? 'today' : ''}">
          <div class="sched-day">
            <span class="sched-day-label">${def.label}${isToday ? ' <span class="today-tag">오늘</span>' : ''}</span>

            <span class="sched-pool-tag ${def.pool}">${poolLabel}</span>
          </div>
          <div class="sched-right">${rightHtml}</div>
        </div>
        ${assignPanelHtml}
      `;
    }).join('');
  }

  const thisWeekRowsHtml = buildScheduleRowsHtml(thisWeekKey, 0);
  const nextWeekRowsHtml = buildScheduleRowsHtml(nextWeekKey, 1);
  const thisWeekMonday = dateForOffsetDayIndex(0, 0);
  const nextWeekMonday = dateForOffsetDayIndex(1, 0);
  const usedIdsThisWeek = new Set(Object.values(thisWeekDays).filter(Boolean).map(d => d.id));

  function buildQueueRows(list, listName){
    return list.map((id, i) => {
      const isActive = usedIdsThisWeek.has(id);
      const isOpen = openMoveTarget === `${listName}:${id}`;
      const isEditOpen = openEditTarget === `${listName}:${id}`;
      const options = list.filter(x => x !== id);
      return `
        <div class="queue-row ${isActive ? 'active-week' : ''}">
          <span class="queue-num">${i+1}</span>
          <span class="queue-name" ${isUnlocked ? `data-list="${listName}" data-id="${escapeHtml(id)}"` : ''} style="${isUnlocked ? 'cursor:pointer;' : ''}">${escapeHtml(id)}${isUnlocked ? ` <span class="caret">${isOpen ? '▾' : '▸'}</span>` : ''}</span>
          ${violations[id] ? `<span class="warn-badge">⚠️${violations[id]}</span>` : ''}
          ${isUnlocked ? `<button class="edit-btn" data-list="${listName}" data-id="${escapeHtml(id)}" title="이름 수정" style="margin-left:auto;">✎</button>` : ''}
          ${isUnlocked ? `<button class="pill-remove" data-list="${listName}" data-idx="${i}" title="삭제">×</button>` : ''}
        </div>
        ${isEditOpen ? `
          <div class="move-panel">
            <p class="footnote" style="margin:0 0 6px; text-align:left;">아이디 수정 (오타 고치기 등)</p>
            <div style="display:flex; gap:8px;">
              <input type="text" class="edit-name-input" id="editname-${listName}-${escapeHtml(id)}" value="${escapeHtml(id)}" style="flex:1; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-family:'IBM Plex Mono',monospace; font-size:13px;" />
              <button class="btn-ghost edit-save-btn" data-list="${listName}" data-oldid="${escapeHtml(id)}">저장</button>
            </div>
          </div>
        ` : ''}
        ${isOpen ? `
          <div class="move-panel">
            <p class="footnote" style="margin:0 0 6px; text-align:left;">${escapeHtml(id)}을(를) 어디로 옮길까요?</p>
            <select class="move-select" data-list="${listName}" data-id="${escapeHtml(id)}">
              <option value="">-- 위치 선택 --</option>
              <option value="__front__">맨 앞으로</option>
              ${options.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)} 밑으로</option>`).join('')}
            </select>
          </div>
        ` : ''}
      `;
    }).join('');
  }

  const waitingPillsHtml = buildQueueRows(waitingList, 'waiting');
  const officerPillsHtml = buildQueueRows(officerList, 'officer');

  const completedListHtml = completedMembers.length
    ? completedMembers.map((c, idx) => `
      <div class="history-item">
        <span class="h-date">${escapeHtml(c.date.slice(5))}(${escapeHtml(c.day)})</span>
        <div style="flex:1; padding:0 10px;">
          <span class="h-main">${escapeHtml(c.id)}</span>
          <span style="color:var(--muted); font-size:11px;"> · ${escapeHtml(c.pool)}</span>
          ${c.noShow
            ? `<span class="warn-badge">⚠️ 노쇼</span>`
            : (c.companionId ? `<span style="color:var(--muted)"> → ${escapeHtml(c.companionId)}</span>` : '')}
        </div>
        ${isUnlocked ? `<button class="reset-violation-btn" data-cidx="${idx}" title="이 기록 삭제">×</button>` : ''}
      </div>
    `).join('')
    : '<div class="empty">아직 완료된 기록이 없습니다</div>';

  const historyWithIdx = history.map((h, idx) => ({ ...h, idx }));
  const historyGroups = groupByMonth(historyWithIdx, h => h.date);
  const historyGroupsHtml = Array.from(historyGroups.entries()).map(([key, items]) => `
    <div class="month-group">
      <p class="month-label">${monthLabel(key)}</p>
      ${items.map(h => `
        <div class="history-item">
          <span class="h-date">${escapeHtml(h.date)}</span>
          <div style="flex:1; padding:0 10px;">
            <span class="h-main">${escapeHtml(h.captainId)}</span>
            ${h.noShow
              ? `<span class="warn-badge">⚠️ 노쇼</span>`
              : (h.companionId ? `<span style="color:var(--muted)"> → ${escapeHtml(h.companionId)}</span>` : '')}
          </div>
          ${isUnlocked ? `<button class="reset-violation-btn" data-hidx="${h.idx}" title="이 기록 삭제">×</button>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');

  const violationEntries = Object.entries(violations)
    .filter(([, c]) => c > 0)
    .sort((a, b) => b[1] - a[1]);
  const violationsHtml = violationEntries.length
    ? violationEntries.map(([id, c]) => `
      <div class="history-item">
        <span class="h-main">${escapeHtml(id)}</span>
        <div style="flex:1; padding:0 10px; text-align:right;">
          <span class="warn-badge">⚠️ ${c}회</span>
        </div>
        ${isUnlocked ? `<button class="reset-violation-btn" data-vid="${escapeHtml(id)}" title="경고 초기화">↺</button>` : ''}
      </div>
    `).join('')
    : '<div class="empty">아직 경고받은 사람이 없어요</div>';

  const lottoRest = lottoHistory.slice(1); // 최신 1건은 위에서 이미 강조 표시
  const lottoHistHtml = lottoRest.length
    ? lottoRest.map(l => `
      <div class="lotto-history-item">
        <span class="l-date">${escapeHtml(l.date)}</span>
        <span class="l-winners">${l.winners.map(escapeHtml).join(', ')}</span>
      </div>
    `).join('')
    : '<div class="empty" style="color:rgba(255,255,255,0.5)">지난 기록이 없어요</div>';

  const lastWinners = lottoHistory.length ? lottoHistory[0].winners : null;

  app.innerHTML = `
    <header>
      <p class="eyebrow">MCN 기차장 시스템</p>
      <h1>MCN 기차장 리스트</h1>
    </header>

    ${lastError ? `<div class="error-banner">${escapeHtml(lastError)}</div>` : ''}

    <div class="lock-bar ${isUnlocked ? 'unlocked' : ''}">
      <span class="lock-icon">${isUnlocked ? '🔓' : '🔒'}</span>
      ${isUnlocked
        ? `<span class="status-label">수정 모드</span><span class="visit-count">👁 ${visitCount}</span><button class="btn-ghost" id="lockBtn" style="padding:6px 12px; font-size:12px;">잠그기</button>`
        : `<input id="pinInput" type="password" placeholder="비밀번호 입력" /><button class="btn-ghost" id="unlockBtn" style="padding:6px 12px; font-size:12px;">잠금 해제</button>`
      }
    </div>
    ${pinError ? `<p class="pin-error" style="color:red;">땡!!!!</p>` : ''}

    <div class="today-card">
      <p class="label">오늘 (${todayDef.label}) 담당</p>
      <p class="captain-id"><span class="train-glyph">🚂</span>${todayInfo && todayInfo.id ? escapeHtml(todayInfo.id) : '미정'}${todayInfo && todayInfo.id && violations[todayInfo.id] ? `<span class="warn-badge" style="color:#FFB199;">⚠️${violations[todayInfo.id]}</span>` : ''}</p>
      <p class="date">${fmtDate(dateForOffsetDayIndex(0, todayIdx))}</p>
    </div>

    <section class="card">
      <h2>📅 이번주 스케줄 (${fmtDate(thisWeekMonday).slice(5)} ~ ${fmtDate(dateForOffsetDayIndex(0,6)).slice(5)})</h2>
      <p class="footnote" style="margin:-8px 0 12px; text-align:left;"></p>
      ${thisWeekRowsHtml}
    </section>

    <section class="card">
      <h2>🔭 다음주 스케줄 (${fmtDate(nextWeekMonday).slice(5)} ~ ${fmtDate(dateForOffsetDayIndex(1,6)).slice(5)})</h2>
      <p class="footnote" style="margin:-8px 0 12px; text-align:left;"></p>
      ${nextWeekRowsHtml}
    </section>

    <section class="card">
      <h2>연맹원 명단 (${waitingList.length}명)</h2>
      <p class="footnote" style="margin:-8px 0 12px; text-align:left;">주황색은 이번주 배정된 사람입니다.</p>
      ${waitingList.length ? `<div class="queue-list">${waitingPillsHtml}</div>` : '<div class="empty">아직 등록된 연맹원이 없습니다</div>'}
      ${isUnlocked ? `
        <div class="add-row">
          <input id="newWaitingInput" type="text" placeholder="아이디 입력 후 추가" />
          <button class="btn-ghost" id="addWaitingBtn">추가</button>
        </div>
      ` : `<p class="locked-note">명단 추가·삭제는 R4만 가능합니다</p>`}
    </section>

    <section class="card">
      <h2>알포 명단 (${officerList.length}명)</h2>
      <p class="footnote" style="margin:-8px 0 12px; text-align:left;">주황색은 이번주 배정된 사람입니다.</p>
      ${officerList.length ? `<div class="queue-list">${officerPillsHtml}</div>` : '<div class="empty">아직 등록된 알포가 없습니다</div>'}
      ${isUnlocked ? `
        <div class="add-row">
          <input id="newOfficerInput" type="text" placeholder="아이디 입력 후 추가" />
          <button class="btn-ghost" id="addOfficerBtn">추가</button>
        </div>
      ` : `<p class="locked-note">명단 추가·삭제는 R4만 가능합니다</p>`}
    </section>

    <section class="card">
      <h2>✅ 기차장 완료 (${completedMembers.length}건)</h2>
      ${completedListHtml}
    </section>

    <section class="card">
      <h2>⚠️ 노쇼 현황 (No Show #)</h2>
      ${violationsHtml}
    </section>

    <section class="card">
      <div class="toggle-row" id="historyToggle">
        <h2>최근 기차장 기록</h2>
        <span class="count-badge">${history.length}건 ${historyExpanded ? '▾' : '▸'}</span>
      </div>
      ${historyExpanded ? (history.length ? historyGroupsHtml : '<div class="empty">아직 기록이 없어요</div>') : ''}
      ${isUnlocked && history.length ? `<button class="btn-ghost" id="clearHistoryBtn" style="width:100%; margin-top:14px;">전체 기록 삭제</button>` : ''}
    </section>

    <div class="lotto-card">
      <h2>🎰 월간 로또 추첨</h2>
      ${isSpinning ? `
        <div class="spin-display">
          <p class="label" style="color:rgba(255,255,255,0.6); margin-bottom:8px;">추첨 중...</p>
          <p class="spin-name">${escapeHtml(spinDisplayName || '???')}</p>
        </div>
      ` : (isUnlocked ? `
        <div class="lotto-controls">
          <input id="lottoCount" type="number" min="1" max="${Math.max(waitingList.length + officerList.length,1)}" value="1" />
          <button class="btn-gold" id="drawBtn" ${(waitingList.length + officerList.length) === 0 ? 'disabled' : ''}>추첨하기</button>
        </div>
      ` : `<p class="locked-note" style="color:rgba(255,255,255,0.45);">추첨은 R4만 가능합니다</p>`)}
      <p class="footnote" style="color:rgba(255,255,255,0.45); margin:8px 0 12px;">한 번 당첨되면 다음 추첨부터 자동으로 제외됩니다.</p>
      ${lastWinners && !isSpinning ? `
        <p class="label" style="margin-bottom:6px;">가장 최근 당첨 (${escapeHtml(lottoHistory[0].date)})</p>
        <div class="winner-pills">${lastWinners.map(w => `<span class="winner-pill pop">${escapeHtml(w)}</span>`).join('')}</div>
      ` : ''}
      <div class="toggle-row" id="lottoToggle">
        <p class="label" style="margin:0;">지난 추첨 기록</p>
        <span class="count-badge">${lottoRest.length}건 ${lottoExpanded ? '▾' : '▸'}</span>
      </div>
      ${lottoExpanded ? lottoHistHtml : ''}
      ${isUnlocked && lottoHistory.length ? `<button class="btn-ghost" id="resetLottoBtn" style="width:100%; margin-top:14px; border-color:rgba(255,255,255,0.25); color:#fff;">당첨 기록 초기화</button>` : ''}
      ${showConfetti ? `<div class="confetti-layer">${confettiPieces}</div>` : ''}
    </div>

    <p class="footnote">버그 신고 데즈곤</p>
  `;

  document.getElementById('unlockBtn')?.addEventListener('click', () => {
    const val = document.getElementById('pinInput')?.value || '';
    if(val === EDIT_PIN){
      isUnlocked = true;
      pinError = false;
    } else {
      pinError = true;
    }
    render();
  });
  document.getElementById('pinInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      document.getElementById('unlockBtn')?.click();
    }
  });
  document.getElementById('lockBtn')?.addEventListener('click', () => {
    isUnlocked = false;
    render();
  });
  document.getElementById('resetLottoBtn')?.addEventListener('click', resetLottoHistory);
  document.getElementById('clearHistoryBtn')?.addEventListener('click', clearAllHistory);
  document.getElementById('historyToggle')?.addEventListener('click', () => {
    historyExpanded = !historyExpanded;
    render();
  });
  document.getElementById('lottoToggle')?.addEventListener('click', () => {
    lottoExpanded = !lottoExpanded;
    render();
  });
  document.getElementById('addWaitingBtn')?.addEventListener('click', () => {
    const input = document.getElementById('newWaitingInput');
    addMember('waiting', input.value);
    input.value = '';
  });
  document.getElementById('newWaitingInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      addMember('waiting', e.target.value);
      e.target.value = '';
    }
  });
  document.getElementById('addOfficerBtn')?.addEventListener('click', () => {
    const input = document.getElementById('newOfficerInput');
    addMember('officer', input.value);
    input.value = '';
  });
  document.getElementById('newOfficerInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      addMember('officer', e.target.value);
      e.target.value = '';
    }
  });
  document.getElementById('drawBtn')?.addEventListener('click', () => {
    const countInput = document.getElementById('lottoCount');
    const count = parseInt(countInput.value, 10) || 1;
    startDraw(count);
  });
  app.querySelectorAll('.sched-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const weekKey = e.currentTarget.getAttribute('data-week');
      const dayKey = e.currentTarget.getAttribute('data-day');
      const action = e.currentTarget.getAttribute('data-action');
      if(action === 'done' || action === 'noshow'){
        const companionInput = document.getElementById(`companion-${weekKey}-${dayKey}`);
        const companionVal = companionInput ? companionInput.value : '';
        advance(weekKey, dayKey, companionVal, action === 'noshow');
      } else if(action === 'toggle'){
        const key = `${weekKey}:${dayKey}`;
        openAssignDay = (openAssignDay === key) ? null : key;
        render();
      } else if(action === 'unassign'){
        unassignDay(weekKey, dayKey);
      }
    });
  });
  app.querySelectorAll('.assign-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const weekKey = e.currentTarget.getAttribute('data-week');
      const dayKey = e.currentTarget.getAttribute('data-day');
      const newId = e.currentTarget.value;
      if(!newId) return;
      assignDay(weekKey, dayKey, newId);
    });
  });
  app.querySelectorAll('.pill-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
      const listName = e.currentTarget.getAttribute('data-list');
      removeMember(listName, idx);
    });
  });
  app.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const listName = e.currentTarget.getAttribute('data-list');
      const id = e.currentTarget.getAttribute('data-id');
      const key = `${listName}:${id}`;
      openEditTarget = (openEditTarget === key) ? null : key;
      openMoveTarget = null;
      render();
    });
  });
  app.querySelectorAll('.edit-save-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const listName = e.currentTarget.getAttribute('data-list');
      const oldId = e.currentTarget.getAttribute('data-oldid');
      const input = document.getElementById(`editname-${listName}-${oldId}`);
      renamePerson(listName, oldId, input ? input.value : '');
    });
  });
  app.querySelectorAll('.edit-name-input').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        const id = inp.id.replace('editname-', '');
        const firstColon = id.indexOf('-');
        const listName = id.slice(0, firstColon);
        const oldId = id.slice(firstColon + 1);
        renamePerson(listName, oldId, inp.value);
      }
    });
  });
  app.querySelectorAll('.queue-name').forEach(el => {
    el.addEventListener('click', (e) => {
      const listName = e.currentTarget.getAttribute('data-list');
      const id = e.currentTarget.getAttribute('data-id');
      const key = `${listName}:${id}`;
      openMoveTarget = (openMoveTarget === key) ? null : key;
      render();
    });
  });
  app.querySelectorAll('.move-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const listName = e.currentTarget.getAttribute('data-list');
      const id = e.currentTarget.getAttribute('data-id');
      const target = e.currentTarget.value;
      if(!target) return;
      movePersonTo(listName, id, target);
    });
  });
  app.querySelectorAll('.reset-violation-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const vid = e.currentTarget.getAttribute('data-vid');
      const hidx = e.currentTarget.getAttribute('data-hidx');
      const cidx = e.currentTarget.getAttribute('data-cidx');
      if(vid !== null){
        resetViolation(vid);
      } else if(hidx !== null){
        deleteHistoryEntry(parseInt(hidx, 10));
      } else if(cidx !== null){
        deleteCompletedEntry(parseInt(cidx, 10));
      }
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadAll();
recordVisit();
</script>
</body>
</html>
