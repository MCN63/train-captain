<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기차장 순번표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF7;
    --ink:#1B1B1F;
    --rail:#34495E;
    --signal:#E4572E;
    --gold:#B8860B;
    --track-done:#C9CDD3;
    --muted:#6B7280;
    --card:#FFFFFF;
    --border:#E7E5DE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header{
    margin-bottom:20px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--muted);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .today-card{
    background:var(--ink);
    color:#fff;
    border-radius:16px;
    padding:22px 20px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .today-card .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.55);
    margin:0 0 10px;
  }
  .today-card .captain-id{
    font-family:'Space Grotesk',sans-serif;
    font-size:34px;
    font-weight:700;
    margin:0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .today-card .train-glyph{
    font-size:22px;
  }
  .today-card .date{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:rgba(255,255,255,0.5);
    margin-top:6px;
  }
  .companion-row{
    margin-top:16px;
    display:flex;
    gap:8px;
  }
  .companion-row input{
    flex:1;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:10px;
    padding:10px 12px;
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
  }
  .companion-row input::placeholder{
    color:rgba(255,255,255,0.4);
  }
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;
    transition:opacity 0.15s ease, transform 0.1s ease;
  }
  button:active{transform:scale(0.97);}
  button:focus-visible{outline:2px solid var(--signal); outline-offset:2px;}
  .btn-signal{
    background:var(--signal);
    color:#fff;
  }
  .btn-signal:disabled{
    background:#555;
    color:#aaa;
    cursor:not-allowed;
  }
  .btn-gold{
    background:var(--gold);
    color:#fff;
  }
  .btn-gold:disabled{
    background:#c9c2b0;
    color:#f2efe8;
    cursor:not-allowed;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--border);
    color:var(--ink);
  }
  section.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
  }
  h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    font-weight:700;
    margin:0 0 14px;
  }
  .pill-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:999px;
    padding:6px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink);
  }
  .pill.current{
    background:var(--signal);
    border-color:var(--signal);
    color:#fff;
    font-weight:600;
  }
  .rail-list{
    list-style:none;
    margin:0;
    padding:0;
    position:relative;
  }
  .rail-list::before{
    content:"";
    position:absolute;
    left:11px;
    top:10px;
    bottom:10px;
    width:2px;
    background:var(--track-done);
  }
  .rail-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding:9px 0;
  }
  .station-dot{
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--card);
    border:2px solid var(--track-done);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--muted);
    z-index:1;
    position:relative;
  }
  .rail-item.current .station-dot{
    width:28px;
    height:28px;
    border-color:var(--signal);
    background:var(--signal);
    color:#fff;
    box-shadow:0 0 0 4px rgba(228,87,46,0.15);
  }
  .rail-item .member-id{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:500;
  }
  .rail-item.current .member-id{
    font-weight:600;
    color:var(--signal);
  }
  .rail-item .remove-btn{
    margin-left:auto;
    background:none;
    border:none;
    color:var(--muted);
    font-size:16px;
    padding:2px 8px;
    cursor:pointer;
  }
  .add-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }
  .add-row input{
    flex:1;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
  }
  .add-row select{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 8px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    color:var(--ink);
    background:var(--card);
    max-width:130px;
  }
  .history-item{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:8px 0;
    border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .history-item:last-child{border-bottom:none;}
  .history-item .h-date{
    font-family:'IBM Plex Mono',monospace;
    color:var(--muted);
    font-size:11px;
    flex-shrink:0;
    width:68px;
  }
  .history-item .h-main{
    font-weight:500;
  }
  .toggle-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    margin:0;
  }
  .toggle-row h2{margin:0;}
  .toggle-row .count-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:4px;
  }
  .month-group{
    margin-top:14px;
  }
  .month-group:first-child{margin-top:12px;}
  .month-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--muted);
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .empty{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    padding:16px 0;
  }
  .footnote{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    margin-top:8px;
  }
  .loading{
    text-align:center;
    padding:60px 0;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
  }
  .error-banner{
    background:#FDECEA;
    border:1px solid #F5B5AC;
    color:#A02C1F;
    border-radius:10px;
    padding:12px 14px;
    font-size:12px;
    font-family:'IBM Plex Mono',monospace;
    margin-bottom:16px;
    word-break:break-all;
    line-height:1.5;
  }
  .lock-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:16px;
  }
  .lock-bar .lock-icon{
    font-size:16px;
    flex-shrink:0;
  }
  .lock-bar input{
    flex:1;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    min-width:0;
  }
  .lock-bar .status-label{
    font-size:12px;
    color:var(--muted);
    flex-shrink:0;
  }
  .lock-bar.unlocked{
    border-color:var(--rail);
    background:#F0F4F7;
  }
  .lock-bar.unlocked .status-label{
    color:var(--rail);
    font-weight:600;
  }
  .pin-error{
    font-size:11px;
    color:#A02C1F;
    margin:-10px 0 14px;
  }
  .locked-note{
    color:var(--muted);
    font-size:12px;
    text-align:center;
    padding:10px 0;
  }
  .lotto-card{
    background:linear-gradient(135deg, #1B1B1F 0%, #34292B 100%);
    color:#fff;
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
  }
  .lotto-card h2{
    color:#fff;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .lotto-controls{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .lotto-controls input{
    width:70px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:10px;
    padding:10px 12px;
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    text-align:center;
  }
  .winner-pills{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:6px 0 14px;
  }
  .winner-pill{
    background:var(--gold);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:8px 14px;
    border-radius:10px;
  }
  .lotto-history-item{
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.12);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .lotto-history-item:last-child{border-bottom:none;}
  .lotto-history-item .l-date{
    font-family:'IBM Plex Mono',monospace;
    color:rgba(255,255,255,0.5);
    flex-shrink:0;
  }
  .lotto-history-item .l-winners{
    text-align:right;
  }
  .lotto-card .toggle-row .count-badge{
    color:rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">불러오는 중…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD5PMMVifLxteN4JGpwL_QvNZpMCpomuZU",
  authDomain: "train-captain.firebaseapp.com",
  databaseURL: "https://train-captain-default-rtdb.firebaseio.com",
  projectId: "train-captain",
  storageBucket: "train-captain.firebasestorage.app",
  messagingSenderId: "95047393942",
  appId: "1:95047393942:web:b3eaf3803a7fb4194ad8b7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let members = [];      // 순환 큐. members[0] = 오늘의 기차장
let cycleCount = 0;     // 이번 순환에서 기차장이 몇 번 확정됐는지
let history = [];      // [{date, captainId, companionId}]
let lottoHistory = []; // [{date, winners:[...]}]
let lastError = null;
let historyExpanded = true;
let lottoExpanded = false;
const EDIT_PIN = 'Ubd63';
let isUnlocked = false;
let pinError = false;

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function monthStr(){
  const d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0');
}

function loadAll(){
  db.ref('rosterState').on('value', snap => {
    const v = snap.val() || {};
    members = v.members || [];
    cycleCount = v.cycleCount || 0;
    render();
  }, err => {
    lastError = '불러오기 실패(명단): ' + err.message;
    render();
  });
  db.ref('historyLog').on('value', snap => {
    history = snap.val() || [];
    render();
  }, err => {
    lastError = '불러오기 실패(기록): ' + err.message;
    render();
  });
  db.ref('lottoHistory').on('value', snap => {
    lottoHistory = snap.val() || [];
    render();
  }, err => {
    lastError = '불러오기 실패(로또): ' + err.message;
    render();
  });
}

async function saveRoster(){
  try{
    await db.ref('rosterState').set({ members, cycleCount });
    if(lastError && lastError.startsWith('저장 실패')){ lastError = null; render(); }
  }catch(e){
    lastError = '저장 실패(명단): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveHistory(){
  try{
    await db.ref('historyLog').set(history.slice(0,50));
  }catch(e){
    lastError = '저장 실패(기록): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

async function saveLotto(){
  try{
    await db.ref('lottoHistory').set(lottoHistory.slice(0,24));
  }catch(e){
    lastError = '저장 실패(로또): ' + (e && e.message ? e.message : String(e));
    render();
  }
}

function addMember(id, position){
  id = id.trim();
  if(!id) return;
  if(members.includes(id)){
    alert('이미 등록된 아이디예요.');
    return;
  }
  const pos = (typeof position === 'number' && position >= 0 && position <= members.length)
    ? position
    : members.length;
  members.splice(pos, 0, id);
  saveRoster();
  render();
}

function removeMember(idx){
  members.splice(idx, 1);
  saveRoster();
  render();
}

function advance(companionId){
  if(members.length === 0) return;
  const captainId = members.shift();
  members.push(captainId); // 오늘의 기차장은 맨 뒤로 가서 다시 순환
  history.unshift({
    date: todayStr(),
    captainId: captainId,
    companionId: (companionId || '').trim()
  });
  cycleCount += 1;
  let didReset = false;
  if(cycleCount >= members.length && members.length > 0){
    // 한 바퀴(전원 순환) 완료 - 기록 리셋
    history = [];
    cycleCount = 0;
    didReset = true;
  }
  saveRoster();
  saveHistory();
  render();
  if(didReset){
    // 리셋 직후에는 기록이 비어있으니 굳이 펼쳐둘 필요 없음
    historyExpanded = false;
  }
}

function shuffledCopy(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawLotto(count){
  if(members.length === 0){
    alert('참가자가 없어요. 먼저 명단에 아이디를 추가해주세요.');
    return;
  }
  const wonSet = new Set(lottoHistory.flatMap(l => l.winners));
  const pool = members.filter(id => !wonSet.has(id));
  if(pool.length === 0){
    alert('이미 모든 인원이 당첨됐어요. "당첨 기록 초기화"를 누르면 처음부터 다시 뽑을 수 있어요.');
    return;
  }
  const n = Math.max(1, Math.min(count, pool.length));
  const winners = shuffledCopy(pool).slice(0, n);
  lottoHistory.unshift({ date: monthStr(), winners });
  saveLotto();
  render();
}

function resetLottoHistory(){
  if(!confirm('당첨 기록을 전부 초기화할까요? 이전에 당첨된 사람도 다시 대상에 포함돼요.')) return;
  lottoHistory = [];
  saveLotto();
  render();
}

function groupByMonth(items, dateStr){
  const map = new Map();
  items.forEach(item => {
    const key = dateStr(item).slice(0,7); // 'YYYY.MM'
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  });
  return map;
}

function monthLabel(key){
  const [y, m] = key.split('.');
  return y + '년 ' + parseInt(m,10) + '월';
}

function render(){
  const app = document.getElementById('app');
  const hasCaptain = members.length > 0;
  const captainId = hasCaptain ? members[0] : null;

  const pillsHtml = members.map((id, i) => `
    <span class="pill ${i === 0 ? 'current' : ''}">${escapeHtml(id)}</span>
  `).join('');

  const railHtml = members.map((id, i) => `
    <li class="rail-item ${i === 0 ? 'current' : ''}">
      <span class="station-dot">${i+1}</span>
      <span class="member-id">${escapeHtml(id)}</span>
      ${isUnlocked ? `<button class="remove-btn" data-idx="${i}" aria-label="삭제" title="삭제">×</button>` : ''}
    </li>
  `).join('');

  const historyGroups = groupByMonth(history, h => h.date);
  const historyGroupsHtml = Array.from(historyGroups.entries()).map(([key, items]) => `
    <div class="month-group">
      <p class="month-label">${monthLabel(key)}</p>
      ${items.map(h => `
        <div class="history-item">
          <span class="h-date">${escapeHtml(h.date)}</span>
          <div style="flex:1; padding:0 10px;">
            <span class="h-main">${escapeHtml(h.captainId)}</span>
            ${h.companionId ? `<span style="color:var(--muted)"> → ${escapeHtml(h.companionId)}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const lottoRest = lottoHistory.slice(1); // 최신 1건은 위에서 이미 강조 표시
  const lottoHistHtml = lottoRest.length
    ? lottoRest.map(l => `
      <div class="lotto-history-item">
        <span class="l-date">${escapeHtml(l.date)}</span>
        <span class="l-winners">${l.winners.map(escapeHtml).join(', ')}</span>
      </div>
    `).join('')
    : '<div class="empty" style="color:rgba(255,255,255,0.5)">지난 기록이 없어요</div>';

  const lastWinners = lottoHistory.length ? lottoHistory[0].winners : null;

  app.innerHTML = `
    <header>
      <p class="eyebrow">Train Captain Rotation</p>
      <h1>기차장 순번표</h1>
    </header>

    ${lastError ? `<div class="error-banner">${escapeHtml(lastError)}</div>` : ''}

    <div class="lock-bar ${isUnlocked ? 'unlocked' : ''}">
      <span class="lock-icon">${isUnlocked ? '🔓' : '🔒'}</span>
      ${isUnlocked
        ? `<span class="status-label">수정 모드</span><button class="btn-ghost" id="lockBtn" style="padding:6px 12px; font-size:12px;">잠그기</button>`
        : `<input id="pinInput" type="password" placeholder="PIN 입력" /><button class="btn-ghost" id="unlockBtn" style="padding:6px 12px; font-size:12px;">잠금 해제</button>`
      }
    </div>
    ${pinError ? `<p class="pin-error">PIN이 맞지 않아요.</p>` : ''}

    <div class="today-card">
      <p class="label">오늘의 기차장</p>
      <p class="captain-id"><span class="train-glyph">🚂</span>${hasCaptain ? escapeHtml(captainId) : '등록된 인원 없음'}</p>
      <p class="date">${todayStr()}</p>
      ${hasCaptain ? (isUnlocked ? `
        <div class="companion-row">
          <input id="companionInput" type="text" placeholder="데려간 연맹원 아이디 (선택)" />
        </div>
        <div style="margin-top:12px;">
          <button class="btn-signal" id="advanceBtn" style="width:100%;">오늘 기차장 확정하고 다음으로 넘기기</button>
        </div>
      ` : `<p class="locked-note" style="color:rgba(255,255,255,0.45);">확정하려면 잠금을 해제하세요</p>`) : ''}
    </div>

    <section class="card">
      <h2>전체 명단 한눈에 보기 (${members.length}명)</h2>
      ${members.length ? `<div class="pill-row">${pillsHtml}</div>` : '<div class="empty">아직 등록된 연맹원이 없어요</div>'}
      <h2 style="margin-top:4px;">순환 순서</h2>
      ${members.length ? `<p class="footnote" style="margin:-6px 0 8px; text-align:left;">이번 순환 진행: ${cycleCount} / ${members.length}명 (다 돌면 아래 기록이 자동으로 리셋돼요)</p>` : ''}
      ${members.length ? `<ul class="rail-list">${railHtml}</ul>` : ''}
      ${isUnlocked ? `
        <div class="add-row">
          <input id="newMemberInput" type="text" placeholder="아이디 입력 후 추가" />
          <select id="insertPosition">
            <option value="0">맨 앞 (다음 기차장)</option>
            ${members.map((m, i) => `<option value="${i+1}" ${i === members.length-1 ? 'selected' : ''}>${escapeHtml(m)} 다음</option>`).join('')}
          </select>
          <button class="btn-ghost" id="addBtn">추가</button>
        </div>
        <p class="footnote" style="margin-top:8px; text-align:left;">삽입 위치를 고르면 순서 중간에도 넣을 수 있어요. 기본은 맨 뒤예요.</p>
      ` : `<p class="locked-note">명단 추가·삭제는 잠금 해제 후 가능해요</p>`}
    </section>

    <section class="card">
      <div class="toggle-row" id="historyToggle">
        <h2>최근 기차장 기록</h2>
        <span class="count-badge">${history.length}건 ${historyExpanded ? '▾' : '▸'}</span>
      </div>
      ${historyExpanded ? (history.length ? historyGroupsHtml : '<div class="empty">아직 기록이 없어요</div>') : ''}
    </section>

    <div class="lotto-card">
      <h2>🎰 월간 로또 추첨</h2>
      ${isUnlocked ? `
        <div class="lotto-controls">
          <input id="lottoCount" type="number" min="1" max="${Math.max(members.length,1)}" value="1" />
          <button class="btn-gold" id="drawBtn" ${members.length === 0 ? 'disabled' : ''}>추첨하기</button>
        </div>
      ` : `<p class="locked-note" style="color:rgba(255,255,255,0.45);">추첨은 잠금 해제 후 가능해요</p>`}
      <p class="footnote" style="color:rgba(255,255,255,0.45); margin:8px 0 12px;">한 번 당첨되면 다음 추첨부터 자동으로 제외돼요.</p>
      ${lastWinners ? `
        <p class="label" style="margin-bottom:6px;">가장 최근 당첨 (${escapeHtml(lottoHistory[0].date)})</p>
        <div class="winner-pills">${lastWinners.map(w => `<span class="winner-pill">${escapeHtml(w)}</span>`).join('')}</div>
      ` : ''}
      <div class="toggle-row" id="lottoToggle">
        <p class="label" style="margin:0;">지난 추첨 기록</p>
        <span class="count-badge">${lottoRest.length}건 ${lottoExpanded ? '▾' : '▸'}</span>
      </div>
      ${lottoExpanded ? lottoHistHtml : ''}
      ${isUnlocked && lottoHistory.length ? `<button class="btn-ghost" id="resetLottoBtn" style="width:100%; margin-top:14px; border-color:rgba(255,255,255,0.25); color:#fff;">당첨 기록 초기화</button>` : ''}
    </div>

    <p class="footnote">혹시 버그가 보이시면 데즈곤에게 귓말주세요~.</p>
  `;

  document.getElementById('unlockBtn')?.addEventListener('click', () => {
    const val = document.getElementById('pinInput')?.value || '';
    if(val === EDIT_PIN){
      isUnlocked = true;
      pinError = false;
    } else {
      pinError = true;
    }
    render();
  });
  document.getElementById('pinInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      document.getElementById('unlockBtn')?.click();
    }
  });
  document.getElementById('lockBtn')?.addEventListener('click', () => {
    isUnlocked = false;
    render();
  });
  document.getElementById('resetLottoBtn')?.addEventListener('click', resetLottoHistory);
  document.getElementById('historyToggle')?.addEventListener('click', () => {
    historyExpanded = !historyExpanded;
    render();
  });
  document.getElementById('lottoToggle')?.addEventListener('click', () => {
    lottoExpanded = !lottoExpanded;
    render();
  });
  document.getElementById('addBtn')?.addEventListener('click', () => {
    const input = document.getElementById('newMemberInput');
    const posSelect = document.getElementById('insertPosition');
    const pos = posSelect ? parseInt(posSelect.value, 10) : undefined;
    addMember(input.value, pos);
    input.value = '';
  });
  document.getElementById('newMemberInput')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      const posSelect = document.getElementById('insertPosition');
      const pos = posSelect ? parseInt(posSelect.value, 10) : undefined;
      addMember(e.target.value, pos);
      e.target.value = '';
    }
  });
  document.getElementById('advanceBtn')?.addEventListener('click', () => {
    const companion = document.getElementById('companionInput')?.value || '';
    advance(companion);
  });
  document.getElementById('drawBtn')?.addEventListener('click', () => {
    const countInput = document.getElementById('lottoCount');
    const count = parseInt(countInput.value, 10) || 1;
    drawLotto(count);
  });
  app.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(e.currentTarget.getAttribute('data-idx'), 10);
      removeMember(idx);
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadAll();
</script>
</body>
</html>
